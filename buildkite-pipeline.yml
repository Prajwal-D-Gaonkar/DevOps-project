steps:
  - label: "Install Dependencies"
    agents: { queue: devops }
    plugins:
      - docker#v5.9.0:
          image: "node:18"
    command: |
      cd app
      npm install

  - label: "Run Tests"
    agents: { queue: devops }
    plugins:
      - docker#v5.9.0:
          image: "node:18"
    command: |
      cd app
      npm test

  - label: "SonarQube Scan"
    agents:
      queue: devops
    command: |
      cd "$BUILDKITE_BUILD_CHECKOUT_PATH"
      sonar-scanner

  - label: "Build Docker Image"
    agents: { queue: devops }
    command: |
      docker build -t devsecops-app .