steps:
  - label: "Install Dependencies"
    agents: { queue: devops }
    command: |
      docker run --rm \
        -v "$PWD:/app" \
        -w /app/app \
        node:18 \
        npm install

  - label: "Run Tests"
    agents: { queue: devops }
    command: |
      docker run --rm \
        -v "$PWD:/app" \
        -w /app/app \
        node:18 \
        npm test

  - label: "SonarQube Scan"
    agents:
      queue: devops
    command: |
      sonar-scanner

  - label: "Build Docker Image"
    agents: { queue: devops }
    command: |
      docker build -t devsecops-app .