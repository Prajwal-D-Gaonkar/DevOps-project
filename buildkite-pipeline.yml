steps:
  - label: "Install Dependencies"
    agents:
      queue: devops
    command: "cd app && npm install"

  - label: "Run Tests"
    agents:
      queue: devops
    command: "cd app && npm test"
  - label: "SonarQube Scan"
    agents:
      queue: devops
    command: |
      npm install -g sonar-scanner
      sonar-scanner -Dsonar.token=$squ_02e2b7e69609c200c026649db91009cddcca5fa5

  - label: "Build Docker Image"
    agents:
      queue: devops
    command: "docker build -t devsecops-app ."